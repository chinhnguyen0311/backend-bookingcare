server:
  port: 8080
  username-admin: admin
  password-admin: admin

spring:
  datasource:
    url: "jdbc:postgresql://localhost:5433/bookingcare_db"
    username: admin
    password: admin
    driver-class-name: "org.postgresql.Driver"
  application:
    name: bookingcare
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
