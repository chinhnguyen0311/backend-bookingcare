version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: postgres_db_booking
    environment:
      POSTGRES_DB: bookingcare_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump-db_booking.sql:/docker-entrypoint-initdb.d/dump-db_booking.sql
    networks:
      - db_network
    restart: unless-stopped
volumes:
  postgres_data:

networks:
  db_network: